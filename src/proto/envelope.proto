// Vendored subset of Signal-Android's SignalService.proto for the
// chat-server's wire Envelope. libsignal-rust does not export this proto;
// the canonical source is signalapp/Signal-Android's protobuf set.
//
// Only fields signal-rs's Phase 6 receive loop reads are included. If a
// downstream consumer needs more (e.g. server_guid, urgent, story flags),
// extend here and rerun build.rs.

syntax = "proto2";
package signalservice;

message Envelope {
    enum Type {
        UNKNOWN              = 0;
        CIPHERTEXT           = 1;
        KEY_EXCHANGE         = 2;
        PREKEY_BUNDLE        = 3;
        RECEIPT              = 5;
        UNIDENTIFIED_SENDER  = 6;
        PLAINTEXT_CONTENT    = 8;
    }
    optional Type   type                   = 1;
    // Pre-2024 wire fields - we ignore but preserve the slot.
    reserved /* source */ 2;
    reserved /* source_uuid */ 3;
    optional uint32 source_device          = 7;
    optional uint64 timestamp              = 5;
    // Legacy field 6: legacy_message (Type==CIPHERTEXT 2017-era); skip.
    optional bytes  content                = 8;
    optional string server_guid            = 9;
    optional uint64 server_timestamp       = 10;
    optional string source_service_id      = 11;   // ACI or PNI E.164/UUID
    optional string destination_service_id = 13;
    optional bool   urgent                 = 14;
    optional string updated_pni            = 15;
    optional bool   story                  = 16;
    optional bytes  report_spam_token      = 18;
    optional bytes  shared_mrm_key         = 19;
}
