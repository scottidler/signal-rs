name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  RUST_VERSION: 1.94.0
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container: debian:bookworm
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            suffix: linux-amd64
    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y curl build-essential git pkg-config libssl-dev \
            cmake protobuf-compiler clang libclang-dev

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Set up Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain ${{ env.RUST_VERSION }}
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          . "$HOME/.cargo/env"
          rustup target add ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: ${{ matrix.target }}

      - name: Build signal-rs for ${{ matrix.target }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p artifacts/
          cp target/${{ matrix.target }}/release/signal-rs artifacts/

      - name: Archive artifacts
        run: tar -czvf signal-rs-${{ github.ref_name }}-${{ matrix.suffix }}.tar.gz -C artifacts signal-rs

      - name: Generate checksum
        run: sha256sum signal-rs-${{ github.ref_name }}-${{ matrix.suffix }}.tar.gz > signal-rs-${{ github.ref_name }}-${{ matrix.suffix }}.tar.gz.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signal-rs-${{ matrix.suffix }}
          path: |
            signal-rs-${{ github.ref_name }}-${{ matrix.suffix }}.tar.gz
            signal-rs-${{ github.ref_name }}-${{ matrix.suffix }}.tar.gz.sha256

  create-release:
    needs: [build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: 'artifacts/**'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
